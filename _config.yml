title: Blooms and Tunes 2027
description: A celebration of flowers and music at St Mary's Church
baseurl: "/Blooms_and_tunes"
url: "https://py1sl.github.io"

# Church contact details (used in footer)
church:
  name: St Mary Magdalene Church
  address_line1: Duns Tew
  address_line2: Oxfordshire
  postcode: OX25 6JP

# Event details
event:
  year: 2027
  dates: "21st - 23rd May 2027"
  location: St Mary Magdalene Church, Duns Tew

# Build settings
markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-seo-tag
  - jekyll-relative-links

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
  - .bundle/
